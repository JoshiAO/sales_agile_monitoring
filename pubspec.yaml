name: compact_sales_monitoring
description: "Multi-role sales monitoring app with Firebase and OpenStreetMap."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  cloud_functions: ^5.0.0
  firebase_storage: ^12.1.0

  # State Management
  provider: ^6.1.5+1

  # Camera & Geolocation
  camera: ^0.10.5+5
  geolocator: ^11.0.0

  # Maps
  flutter_map: ^6.2.0
  latlong2: ^0.9.0
  cached_network_image: ^3.3.1

  # HTTP & Networking
  http: ^1.2.0
  dio: ^5.4.0
  archive: ^3.6.1
  excel: ^4.0.6

  # UI & UX
  image_picker: ^1.1.0
  image: ^4.2.0
  qr: ^3.0.2
  path_provider: ^2.1.4
  intl: ^0.20.1
  uuid: ^4.2.0

  # Platform specific
  url_launcher: ^6.3.0
  saver_gallery: ^4.1.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/JoshiAO.jpg

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/tiles/luzon/
